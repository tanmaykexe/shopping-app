<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping App</title>

<style>

:root{
    --bg:#f8fafc;
    --card:#ffffff;
    --primary:#2563eb;
    --primary-hover:#1d4ed8;
    --success:#10b981;
    --danger:#ef4444;
    --text:#1e293b;
    --muted:#64748b;
    --border:#e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    background:white;
    border-bottom:1px solid var(--border);
    padding:30px;
    text-align:center;
}

header h1{
    font-size:34px;
    margin-bottom:10px;
}

header p{
    color:var(--muted);
    font-size:14px;
    letter-spacing:1px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:25px;
    transition:.25s;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 24px rgba(0,0,0,.08);
}

.icon{
    font-size:60px;
    text-align:center;
    margin-bottom:20px;
}

.product{
    font-size:22px;
    font-weight:700;
    margin-bottom:10px;
}

.price{
    color:var(--success);
    font-size:28px;
    font-weight:bold;
    margin-bottom:8px;
}

.stock{
    color:var(--muted);
    margin-bottom:20px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:var(--primary);
    color:white;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:var(--primary-hover);
}

button:disabled{
    background:#cbd5e1;
    cursor:not-allowed;
}

#toast{
    position:fixed;
    right:20px;
    bottom:20px;
    background:#111827;
    color:white;
    padding:15px 20px;
    border-radius:8px;
    display:none;
    z-index:999;
}

footer{
    margin-top:auto;
    padding:25px;
    text-align:center;
    color:var(--muted);
    border-top:1px solid var(--border);
    background:white;
}

</style>

</head>

<body>

<header>

<h1>🛒 Shopping App</h1>

<p>Docker • Node.js • MySQL • Kubernetes • Kind</p>

</header>

<div class="container" id="products">

</div>

<div id="toast"></div>

<footer>

Built by Tanmay • Powered by Docker & Kubernetes 🚀

</footer>

<script>

const API_URL="/products";

function showToast(message,isError=false){

    const toast=document.getElementById("toast");

    toast.innerText=message;

    toast.style.background=isError?"#ef4444":"#111827";

    toast.style.display="block";

    setTimeout(()=>{

        toast.style.display="none";

    },3000);

}

async function loadProducts(){

    try{

        const response=await fetch(API_URL);

        if(!response.ok){

            throw new Error("Failed to fetch products");

        }

        const products=await response.json();

        const container=document.getElementById("products");

        container.innerHTML="";

        products.forEach(product=>{

            const outOfStock=product.quantity<=0;

            container.innerHTML+=`

            <div class="card">

                <div>

                    <div class="icon">📦</div>

                    <div class="product">

                        ${product.name}

                    </div>

                    <div class="price">

                        ₹${Number(product.price).toLocaleString("en-IN")}

                    </div>

                    <div class="stock">

                        ${outOfStock ? "Out of Stock" : `Stock : ${product.quantity}`}

                    </div>

                </div>

                <button

                    ${outOfStock?"disabled":""}

                    onclick="buyProduct(${product.id})">

                    ${outOfStock?"Sold Out":"Buy Now"}

                </button>

            </div>

            `;

        });

    }

    catch(err){

        console.error(err);

        showToast("Unable to connect to backend.",true);

    }

}

async function buyProduct(id){

    try{

        const response=await fetch(`${API_URL}/${id}/purchase`,{

            method:"POST"

        });

        const data=await response.json();

        if(!response.ok){

            throw new Error(data.message);

        }

        showToast("Purchase Successful ✅");

        loadProducts();

    }

    catch(err){

        showToast(err.message||"Purchase Failed",true);

    }

}

loadProducts();

</script>

</body>
</html>
