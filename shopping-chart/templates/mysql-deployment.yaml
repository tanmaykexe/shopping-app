apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "shopping-app.fullname" . }}-mysql

  labels:
    {{- include "shopping-app.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.mysql.replicaCount }}

  selector:
    matchLabels:
      app: {{ include "shopping-app.fullname" . }}-mysql

  template:
    metadata:
      labels:
        app: {{ include "shopping-app.fullname" . }}-mysql

    spec:
      containers:
      - name: mysql

        image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"

        imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}

        ports:
        - containerPort: {{ .Values.mysql.service.port }}

        env:
        - name: MYSQL_DATABASE
          value: {{ .Values.mysql.auth.database | quote }}

        - name: MYSQL_ROOT_PASSWORD
          value: {{ .Values.mysql.auth.password | quote }}

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

        resources:
          requests:
            cpu: {{ .Values.mysql.resources.requests.cpu }}
            memory: {{ .Values.mysql.resources.requests.memory }}

          limits:
            cpu: {{ .Values.mysql.resources.limits.cpu }}
            memory: {{ .Values.mysql.resources.limits.memory }}

      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: {{ include "shopping-app.fullname" . }}-mysql-pvc
