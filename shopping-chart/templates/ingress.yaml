{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ include "shopping-app.fullname" . }}-ingress

  labels:
    {{- include "shopping-app.labels" . | nindent 4 }}

spec:
  ingressClassName: nginx

  rules:
  - host: {{ .Values.ingress.host }}

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: {{ include "shopping-app.fullname" . }}-frontend-service

            port:
              number: {{ .Values.frontend.service.port }}

{{- end }}
